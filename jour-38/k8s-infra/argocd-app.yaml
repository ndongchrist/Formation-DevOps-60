apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ndongchrist/Formation-DevOps-60   # <-- replace with your repo
    targetRevision: HEAD
    path: jour-38/k8s-infra/k8s/                           # folder inside the repo

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true       # remove resources deleted from git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
